<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080810">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UberAccounts">
  <link rel="apple-touch-icon" href="/icon.png">
  <title>Uber Accounts Manager</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-noise"></div>
  <div class="bg-glow"></div>

  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-mark">U</div>
        <div class="logo-info">
          <span class="logo-title">UberAccounts</span>
          <span class="logo-sub">Manager</span>
        </div>
      </div>
      <div id="stats" class="stats-bar"></div>
    </div>
  </header>

  <main>

    <!-- FILTROS -->
    <section class="card" id="section-filters">
      <div class="section-header" onclick="toggleSection('filters')">
        <span class="section-title">🔍 Filtros</span>
        <button class="btn-collapse" id="arrow-filters">▲</button>
      </div>
      <div class="section-body" id="body-filters">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="text" id="search" placeholder="Buscar por email…" oninput="loadAccounts()">
        </div>
        <div class="filter-chips">
          <span class="chip-label">Uber One</span>
          <button class="chip active" data-filter="" onclick="setChip(this)">Todos</button>
          <button class="chip" data-filter="activo" onclick="setChip(this)">✓ Activo</button>
          <button class="chip" data-filter="sin" onclick="setChip(this)">✗ Sin Uber One</button>
          <button class="chip" data-filter="expirando" onclick="setChip(this)">⚠ Expirando pronto</button>
        </div>
        <div class="filter-row">
          <div class="field-sm">
            <label>Pedidos mín.</label>
            <input type="number" id="minPedidos" placeholder="0" oninput="loadAccounts()">
          </div>
          <div class="field-sm">
            <label>Reembolsos mín.</label>
            <input type="number" id="minReembolsos" placeholder="0" oninput="loadAccounts()">
          </div>
          <div class="field-sm">
            <label>Ordenar por</label>
            <select id="ordenar" onchange="loadAccounts()">
              <option value="">Sin orden</option>
              <option value="estrella">⭐ Favoritos primero</option>
              <option value="pedidos">Más pedidos</option>
              <option value="reembolsos">Más reembolsos</option>
              <option value="expira">Expira antes</option>
              <option value="ratio">Mayor ratio</option>
            </select>
          </div>
        </div>
        <button class="btn-ghost-sm" onclick="resetFilters()">↺ Limpiar filtros</button>
      </div>
    </section>

    <!-- NUEVA CUENTA -->
    <section class="card" id="section-form">
      <div class="section-header" onclick="toggleSection('form')">
        <span class="section-title">➕ Nueva cuenta</span>
        <button class="btn-collapse" id="arrow-form">▼</button>
      </div>
      <div class="section-body hidden" id="body-form">
        <div class="form-grid">
          <div class="field span-2">
            <label>Email</label>
            <input id="email" placeholder="cuenta@ejemplo.com" type="email">
          </div>
          <div class="field">
            <label>Pedidos</label>
            <input id="pedidos" type="number" placeholder="0" min="0">
          </div>
          <div class="field">
            <label>Reembolsos</label>
            <input id="reembolsos" type="number" placeholder="0" min="0">
          </div>
          <div class="field">
            <label>Uber One expira</label>
            <input id="uberOne" type="date">
          </div>
          <div class="field">
            <label>Tarjetas</label>
            <input id="tarjetas" placeholder="Ej: 4311, 7297">
          </div>
          <div class="field span-2">
            <label>Notas</label>
            <textarea id="notas" placeholder="Ej: celular de mamá, PC trabajo, cuenta vieja…" rows="2"></textarea>
          </div>
          <button class="btn-accent span-2" onclick="addAccount()">＋ Guardar cuenta</button>
        </div>
      </div>
    </section>

    <!-- CUENTAS -->
    <section class="card">
      <div class="section-header no-click">
        <span class="section-title">📋 Cuentas <span id="count-badge" class="count-badge">0</span></span>
        <div class="view-toggle">
          <button id="btn-cards" class="view-btn active" onclick="setView('cards')" title="Vista tarjetas">⊞</button>
          <button id="btn-table" class="view-btn" onclick="setView('table')" title="Vista tabla">☰</button>
        </div>
      </div>

      <div id="view-cards" class="accounts-grid"></div>

      <div id="view-table" class="table-wrap hidden">
        <table>
          <thead>
            <tr>
              <th>⭐</th>
              <th>Email</th>
              <th>Pedidos</th>
              <th>Reembolsos</th>
              <th>Ratio</th>
              <th>Uber One</th>
              <th>Tarjetas</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="accountsTable"></tbody>
        </table>
      </div>
    </section>

    <!-- WHATSAPP TEST -->
    <section class="card card-wa">
      <button class="btn-whatsapp" onclick="testWhatsApp()">
        <span class="wa-icon">📲</span>
        <div>
          <div class="wa-title">Probar notificación WhatsApp</div>
          <div class="wa-sub">Envía un mensaje de prueba vía CallMeBot</div>
        </div>
        <span class="wa-arrow">→</span>
      </button>
    </section>

  </main>

  <input type="hidden" id="uberFilter" value="">
  <script src="app.js"></script>
</body>
</html>
